version: "3.9"

services:

  postgres:
    image: postgres:15
    container_name: library_postgres
    restart: always
    environment:
      POSTGRES_DB: library_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - library_postgres_data:/var/lib/postgresql/data

volumes:
  library_postgres_data: